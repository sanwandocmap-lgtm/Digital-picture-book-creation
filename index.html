<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ai智慧生活-數位繪本創作展覽</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e67e22;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        body { font-family: 'Noto Sans TC', sans-serif; margin: 0; background: var(--bg-gradient); background-attachment: fixed; min-height: 100vh; }
        header { 
            background-color: rgba(255, 255, 255, 0.95); 
            min-height: 130px; 
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 0 40px;
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
        }
        .header-left { display: flex; align-items: center; }
        .logo-img { height: 90px; width: auto; margin-right: 15px; }
        .org-name { font-weight: 700; color: #27ae60; font-size: 1.3rem; white-space: nowrap; }
        .main-title { font-size: 3.2rem; margin: 0; color: var(--primary-color); letter-spacing: 5px; font-weight: 900; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); text-align: center; }
        .container { max-width: 1400px; margin: 50px auto; padding: 0 40px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 40px; }
        .video-card { background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.08); transition: transform 0.3s ease; display: flex; flex-direction: column; }
        .video-card:hover { transform: translateY(-10px); }
        .video-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; background: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .video-info { padding: 25px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .video-info h2 { font-size: 1.3rem; color: var(--primary-color); margin: 0 0 10px 0; height: 3em; display: flex; align-items: center; justify-content: center; line-height: 1.4; }
        .subtitle { color: #7f8c8d; margin-bottom: 20px; font-size: 0.95rem; min-height: 2.4em; }
        .author-tag { background: linear-gradient(135deg, #e67e22, #d35400); color: white; padding: 10px 30px; border-radius: 50px; font-weight: 700; align-self: center; }
        @media (max-width: 1100px) { header { grid-template-columns: 1fr; height: auto; padding: 20px; } .header-left { justify-content: center; margin-bottom: 15px; } .main-title { font-size: 2rem; } }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <img src="https://cdn.phototourl.com/uploads/2026-03-09-63d6ab64-7c2d-488d-9d13-aecab5c13d08.png" alt="三灣DOC Logo" class="logo-img">
        <div class="org-name">三灣數位機會中心</div>
    </div>
    <h1 class="main-title">Ai智慧生活-數位繪本創作展覽</h1>
    <div></div>
</header>

<div class="container">
    <div class="gallery">
        <div class="video-card">
            <div class="video-container"><iframe src="https://www.youtube.com/embed/0S7GITxhbos" allowfullscreen></iframe></div>
            <div class="video-info">
                <h2>雲端上的勇氣：阿翔與通仔的加里山大冒險</h2>
                <div class="subtitle">阿翔與通仔的冒險生活</div>
                <div class="author-tag">創作者：賴季祥</div>
            </div>
        </div>

        <div class="video-card">
            <div class="video-container"><iframe src="https://www.youtube.com/embed/gX51teXwejI" allowfullscreen></iframe></div>
            <div class="video-info">
                <h2>佳玥的活力新玥章</h2>
                <div class="subtitle">佳玥退休後的新章</div>
                <div class="author-tag">創作者：鄭佳玥</div>
            </div>
        </div>

        <div class="video-card">
            <div class="video-container"><iframe src="https://www.youtube.com/embed/FP5-3is_Hyc" allowfullscreen></iframe></div>
            <div class="video-info">
                <h2>雲雲的義大歡樂大冒險</h2>
                <div class="subtitle">碧雲的退休冒險</div>
                <div class="author-tag">創作者：王璧雲</div>
            </div>
        </div>

        <div class="video-card">
            <div class="video-container"><iframe src="https://www.youtube.com/embed/MOa0QgLNk7g" allowfullscreen></iframe></div>
            <div class="video-info">
                <h2>櫻花下的足跡：日月潭的勇氣馬拉松</h2>
                <div class="subtitle">先生的櫻花下的足跡</div>
                <div class="author-tag">創作者：王鳳玲</div>
            </div>
        </div>

        <div class="video-card">
            <div class="video-container"><iframe src="https://www.youtube.com/embed/UdyBhzAuZYw" allowfullscreen></iframe></div>
            <div class="video-info">
                <h2>奔跑在草莓香氣的榮耀</h2>
                <div class="subtitle">先生大湖草莓氣息中的榮耀</div>
                <div class="author-tag">創作者：王鳳玲</div>
            </div>
        </div>

        </div>
</div>
</body>
</html>
