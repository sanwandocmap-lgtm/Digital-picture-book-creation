<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ai智慧生活-數位繪本創作展覽</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50;
            --art-bg-1: #6a11cb;
            --art-bg-2: #2575fc;
            --art-bg-3: #ff0844;
            --art-bg-4: #ffb199;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans TC', sans-serif;
            overflow-x: hidden;
        }

        /* ✨ 背景動畫 */
        .dynamic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(-45deg, var(--art-bg-1), var(--art-bg-2), var(--art-bg-3), var(--art-bg-4));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            z-index: -1;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 🚪 入口處設計 */
        #entrance {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            transition: opacity 1s ease, visibility 1s;
        }

        .entrance-logo-area {
            position: absolute;
            top: 40px;
            left: 40px;
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.15);
            padding: 10px 20px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
        }

        .entrance-logo-img { height: 60px; margin-right: 15px; }

        .entrance-title {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 10px;
            margin-bottom: 30px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: fadeInUp 1.5s ease;
        }

        .enter-btn {
            padding: 18px 60px;
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            background: rgba(255,255,255,0.2);
            border: 2px solid white;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            animation: fadeInUp 2s ease;
        }

        .enter-btn:hover {
            background: white;
            color: var(--art-bg-1);
            transform: scale(1.1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        /* 🖼️ 正式展覽區 (初始隱藏) */
        #main-exhibition {
            display: none;
            opacity: 0;
            transition: opacity 1s ease;
        }

        header {
            background-color: rgba(255, 255, 255, 0.85);
            min-height: 110px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 0 40px;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(15px);
            box-shadow: 0 4px 30px rgba(0,0,0,0.1);
        }

        .logo-img { height: 70px; margin-right: 15px; }
        .org-name { font-weight: 700; color: #27ae60; font-size: 1.1rem; white-space: nowrap; }
        .main-title { font-size: 2.2rem; font-weight: 900; color: var(--primary-color); text-align: center; }

        .container { max-width: 1400px; margin: 50px auto; padding: 0 40px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 35px; }

        .video-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.4s ease;
            backdrop-filter: blur(5px);
        }
        .video-card:hover { transform: translateY(-10px); background: #fff; }

        .video-container { position: relative; padding-bottom: 56.25%; height: 0; background: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .video-info { padding: 20px; text-align: center; }
        .video-info h2 { font-size: 1.2rem; margin: 0 0 10px; height: 2.8em; display: flex; align-items: center; justify-content: center; }
        .author-tag { background: linear-gradient(135deg, #e67e22, #d35400); color: white; padding: 8px 25px; border-radius: 50px; font-size: 0.9rem; display: inline-block; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .entrance-title { font-size: 2rem; letter-spacing: 4px; }
            header { grid-template-columns: 1fr; text-align: center; height: auto; padding: 20px; }
            .header-left { justify-content: center; margin-bottom: 10px; }
        }
    </style>
</head>
<body>

<div class="dynamic-bg"></div>

<div id="entrance">
    <div class="entrance-logo-area">
        <img src="https://cdn.phototourl.com/uploads/2026-03-09-63d6ab64-7c2d-488d-9d13-aecab5c13d08.png" class="entrance-logo-img">
        <span style="font-weight:bold">三灣數位機會中心</span>
    </div>
    <h1 class="entrance-title">Ai智慧生活<br>數位繪本創作線上展覽</h1>
    <button class="enter-btn" onclick="startExhibition()">點擊進入展覽</button>
</div>

<div id="main-exhibition">
    <header>
        <div class="header-left">
            <img src="https://cdn.phototourl.com/uploads/2026-03-09-63d6ab64-7c2d-488d-9d13-aecab5c13d08.png" alt="Logo" class="logo-img">
            <div class="org-name">三灣數位機會中心</div>
        </div>
        <h1 class="main-title">數位繪本創作展覽</h1>
        <div></div>
    </header>

    <div class="container">
        <div class="gallery">
            <div class="video-card">
                <div class="video-container"><iframe src="https://www.youtube.com/embed/0S7GITxhbos" allowfullscreen></iframe></div>
                <div class="video-info"><h2>雲端上的勇氣：阿翔與通仔的加里山大冒險</h2><div class="author-tag">創作者：賴季祥</div></div>
            </div>
            <div class="video-card">
                <div class="video-container"><iframe src="https://www.youtube.com/embed/gX51teXwejI" allowfullscreen></iframe></div>
                <div class="video-info"><h2>佳玥的活力新玥章</h2><div class="author-tag">創作者：鄭佳玥</div></div>
            </div>
            </div>
    </div>
</div>

<script>
    function startExhibition() {
        // 隱藏入口
        document.getElementById('entrance').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('entrance').style.display = 'none';
            // 顯示展覽區
            const main = document.getElementById('main-exhibition');
            main.style.display = 'block';
            setTimeout(() => { main.style.opacity = '1'; }, 50);
        }, 1000);
    }
</script>

</body>
</html>
